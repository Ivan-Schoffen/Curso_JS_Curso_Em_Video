<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 01</title>
</head>
<body>
   
    <p>Em qual país você vive?</p>
    <input type="text" name="pais" id="pais">
    <input type="button" value="Verificar" onclick="verifica()">
    <div id="resposta">

    </div>
    
    <script>

        function verifica() {
            var pais = document.getElementById('pais').value
            var reply = document.getElementById('resposta')

            if(pais != 'BRASIL') {
                reply.innerText = 'Voce é estrangeiro'
            } else {
                reply.innerText = 'Voce é brasileiro'
            }

        }

    </script>

</body>
</html>
